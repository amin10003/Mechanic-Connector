<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Mechanic Connector</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script type="module" src="/js/main.js"></script>
  </head>
  <body>
    <div
      id="cont"
      class="min-h-screen p-6 m-0 text-xl bg-gray-100 flex flex-col justify-center items-center"
    >
      <div
        class="block mx-auto bg-white p-6 rounded-md flex flex-col justify-between items-center"
      >
        <h1 class="text-4xl font-bold text-center text-[#333] montserrat">
          Mechanic Connector
        </h1>
        <h2 class="text-3xl font-semibold text-center text-[#333] my-4">
          Bridging the Gap Between Skilled Mechanics & Drivers in Need
        </h2>
        <p>
          Find trusted mechanics near you or connect with customers who need
          your expertise. Mechanic Connector makes it simple, fast, and reliable
          to get the job done.
        </p>

        <div>
          <h3 class="text-2xl font-semibold text-center text-[#333] my-4">
            Choose User
          </h3>
          <div class="flex justify-between items-center my-5">
            <span class="mx-6 font-medium"
              ><button
                id="userSwitchbtn-1"
                class="bg-blue-500 font-semibold hover:bg-blue-600 hover:scale-105 transform transition-all duration-200 rounded-xl px-4 text-white py-2"
              >
                <a href="/html/serviceProvider/log.html"
                  >Continue as Service Provider</a
                >
              </button></span
            ><span class="mx-6 font-medium"
              ><button
                id="userSwitchbtn-2"
                class="bg-blue-500 font-semibold hover:bg-blue-600 hover:scale-105 transform transition-all duration-200 rounded-xl px-2 text-white py-2"
              >
                <a href="/html/serviceSeeker/log.html">
                  Continue as Service Seeker</a
                >
              </button></span
            >
          </div>
        </div>
      </div>
    </div>
  </body>
</html>
