<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Mechanic Connector</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script defer src="/src/images.js"></script>
  </head>
  <body class="overflow-x-hidden p-10">
    <div
      class="min-h-screen p-6 rounded-lg bg-gray-100 my-10 grid grid-cols-[250px_1fr] grid-rows-[auto_1fr]"
    >
      <!-- Sidebar -->
      <aside class="row-span-2 bg-gray-200 p-6 flex flex-col justify-start g-6">
        <span class="font-semibold text-xl">Acccount</span>
        <nav class="row-auto flex flex-col gap-4 mt-6">
          <div class="font-semibold text-xl"><a href="/html/serviceProvider/dashboard.html">Dashboard</a></div>
          <div class="font-semibold text-xl"><a href="/html/serviceProvider/tasks.html">Tasks</a></div>
          <div class="font-semibold text-xl"><a href="/html/serviceProvider/employees.html">Employees</a></div>
          <div class="font-semibold text-xl"><a href="/html/serviceProvider/services.html">Services</a></div>
          <div class="font-semibold text-xl"><a href="/html/serviceProvider/payment.html">Payment</a></div>
        </nav>
      </aside>

      <!-- Header -->
      <header
        class="col-start-2 row-start-1 bg-gray-500 text-white flex justify-between items-center px-6 py-3"
      >
        <div>Title</div>
        <div>
          <input
            type="text"
            placeholder="search"
            class="rounded-xl p-2 focus:outline-none text-black text-xl focus:ring-2 focus:ring-blue-500"
          />
        </div>
        <div>
          <span> toggle </span>
          <span> notification </span>
        </div>
      </header>

      <!-- Main -->
      <main
        class="col-start-2 row-start-2 bg-gray-100 overflow-y-scroll h-full"
      >
        <section id="dashboardCard" class="gap-6 p-6">
          <div class="flex justify-between px-6 items-center w-full pb-6">
            <h1 class="text-2xl font-bold">My Services</h1>

            <button class="bg-blue-500 text-white px-4 py-2 rounded-lg">
              + Add Service
            </button>
          </div>
          <div class="px-6">
            <div class="bg-white rounded-xl shadow overflow-hidden">
              <table class="w-full text-left">
                <thead class="bg-gray-200">
                  <tr>
                    <th class="p-3">Service Name</th>
                    <th class="p-3">Price</th>
                    <th class="p-3">Description</th>
                    <th class="p-3 text-center">Actions</th>
                  </tr>
                </thead>

                <tbody>
                  <tr class="border-t">
                    <td class="p-3">Oil Change</td>
                    <td class="p-3">KSh 2000</td>
                    <td class="p-3">Basic engine oil replacement</td>
                    <td class="p-3 flex gap-2 justify-center">
                      <button class="bg-yellow-400 px-3 py-1 rounded">
                        Edit
                      </button>
                      <button class="bg-red-500 text-white px-3 py-1 rounded">
                        Delete
                      </button>
                    </td>
                  </tr>
                  <tr class="border-t">
                    <td class="p-3">Towing</td>
                    <td class="p-3">KSh 15000</td>
                    <td class="p-3">
                      Towing from the point of breakage to the garage
                    </td>
                    <td class="p-3 flex gap-2 justify-center">
                      <button class="bg-yellow-400 px-3 py-1 rounded">
                        Edit
                      </button>
                      <button class="bg-red-500 text-white px-3 py-1 rounded">
                        Delete
                      </button>
                    </td>
                  </tr>

                  <!-- More rows dynamically -->
                </tbody>
              </table>
            </div>
          </div>
        </section>
      </main>
    </div>
  </body>
</html>
